<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #111118;
      --bg-tertiary: #1a1a24;
      --bg-card: #16161f;
      --bg-card-hover: #1e1e2a;
      --border-color: #2a2a3a;
      --border-subtle: #1f1f2e;
      --text-primary: #ffffff;
      --text-secondary: #9898a8;
      --text-muted: #5a5a6e;
      --accent-primary: #6366f1;
      --accent-secondary: #818cf8;
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      --accent-glow: rgba(99, 102, 241, 0.25);
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.12);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.12);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.12);
      --info: #3b82f6;
      --info-bg: rgba(59, 130, 246, 0.12);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 15% 15%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 85%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--bg-tertiary);
      border: 1px solid var(--accent-primary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--accent-primary);
      font-weight: 600;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      padding: 4px 10px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 24px;
      background: var(--bg-card);
      padding: 4px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
    }

    .tab {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tab:hover {
      color: var(--text-secondary);
      background: var(--bg-tertiary);
    }

    .tab.active {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }

    .tab-icon { 
      font-size: 6px; 
      color: var(--accent-primary);
    }
    
    .tab.active .tab-icon {
      color: var(--accent-secondary);
    }

    /* Tab Content */
    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Status Grid */
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .status-item {
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border-subtle);
      transition: all 0.2s ease;
    }

    .status-item:hover {
      border-color: var(--accent-primary);
    }

    .status-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-item:hover {
      border-color: var(--accent-primary);
      transform: translateY(-2px);
    }

    .status-icon {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 8px currentColor;
    }

    .status-icon.online { background: #10b981; box-shadow: 0 0 12px #10b981; }
    .status-icon.offline { background: #ef4444; box-shadow: 0 0 12px #ef4444; }
    .status-icon.warning { background: #f59e0b; box-shadow: 0 0 12px #f59e0b; }

    .status-info h4 {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 1px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-info p {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Schedule Grid */
    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .schedule-day {
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      padding: 12px;
      min-height: 120px;
      border: 1px solid var(--border-subtle);
    }

    .schedule-day.today {
      border-color: var(--accent-primary);
      background: rgba(99, 102, 241, 0.08);
    }

    .day-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .schedule-day.today .day-name {
      color: var(--accent-secondary);
    }

    .task-pill {
      font-size: 11px;
      padding: 4px 8px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid var(--border-subtle);
    }

    /* Color-coded pills by system */
    .task-pill.email { border-left: 2px solid #3b82f6; }
    .task-pill.telegram { border-left: 2px solid #10b981; }
    .task-pill.web { border-left: 2px solid #f59e0b; }
    
    /* System colors */
    .task-pill.tm-21m { border-left: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }      /* Blue - 21M */
    .task-pill.tm-podcast { border-left: 3px solid #a855f7; background: rgba(168, 85, 247, 0.1); }   /* Purple - Podcast */
    .task-pill.tm-finance { border-left: 3px solid #10b981; background: rgba(16, 185, 129, 0.1); }   /* Green - Finance */
    .task-pill.tm-ebay { border-left: 3px solid #f97316; background: rgba(249, 115, 22, 0.1); }      /* Orange - eBay */
    .task-pill.tm-lead { border-left: 3px solid #eab308; background: rgba(234, 179, 8, 0.1); }       /* Yellow - Lead Gen */
    .task-pill.tm-family { border-left: 3px solid #ec4899; background: rgba(236, 72, 153, 0.1); }    /* Pink - Family */
    .task-pill.tm-system { border-left: 3px solid #6b7280; background: rgba(107, 114, 128, 0.1); }   /* Gray - System */

    /* Tasks List */
    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      transition: all 0.2s ease;
    }

    .task-row:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-primary);
    }

    .task-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }

    .task-status.idle { background: var(--text-muted); }
    .task-status.error { background: var(--danger); }

    .task-name {
      flex: 1;
      font-weight: 500;
      font-size: 14px;
    }

    .task-schedule {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-card);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
    }

    .task-next {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 100px;
      text-align: right;
    }

    /* Control Buttons */
    .control-btn {
      padding: 6px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .control-btn:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-primary);
      color: var(--text-primary);
    }

    /* Embeds */
    .embed-container {
      width: 100%;
      height: calc(100vh - 200px);
      min-height: 600px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border-subtle);
      background: var(--bg-tertiary);
    }

    .embed-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .embed-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
    }

    .embed-placeholder .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Next Up */
    .next-up-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .next-up-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
    }

    .next-up-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      min-width: 120px;
    }

    .next-up-name {
      flex: 1;
      font-weight: 500;
      font-size: 14px;
    }

    .next-up-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
    }

    .next-up-status.completed { background: var(--success-bg); color: var(--success); }
    .next-up-status.running { background: var(--warning-bg); color: var(--warning); }
    .next-up-status.error { background: var(--danger-bg); color: var(--danger); }

    /* Responsive */
    @media (max-width: 768px) {
      .tabs { overflow-x: auto; }
      .schedule-grid { grid-template-columns: 1fr; }
      .status-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">◈</div>
        <h1>Mission Control</h1>
      </div>
      <div class="header-right">
        <div class="clock" id="clock">--:--:--</div>
      </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="system">
        <span class="tab-icon">●</span> System
      </button>
      <button class="tab" data-tab="schedule">
        <span class="tab-icon">●</span> Schedule
      </button>
      <button class="tab" data-tab="tasks">
        <span class="tab-icon">●</span> Tasks
      </button>
      <button class="tab" data-tab="ebay">
        <span class="tab-icon">●</span> eBay
      </button>
      <button class="tab" data-tab="levelup">
        <span class="tab-icon">●</span> Level Up
      </button>
      <button class="tab" data-tab="podcast">
        <span class="tab-icon">●</span> Podcast
      </button>
    </div>

    <!-- Tab Contents -->
    <div class="tab-content active" id="tab-system">
      <div class="status-grid" id="status-grid">
        <div class="status-item">
          <div class="status-icon online" id="light-gateway"></div>
          <div class="status-info">
            <h4>Gateway</h4>
            <p id="status-gateway">Checking...</p>
          </div>
        </div>
        <div class="status-item">
          <div class="status-icon online" id="light-telegram"></div>
          <div class="status-info">
            <h4>Telegram</h4>
            <p id="status-telegram">Checking...</p>
          </div>
        </div>
        <div class="status-item">
          <div class="status-icon online" id="light-email"></div>
          <div class="status-info">
            <h4>Email</h4>
            <p id="status-email">Checking...</p>
          </div>
        </div>
        <div class="status-item">
          <div class="status-icon online" id="light-pm2"></div>
          <div class="status-info">
            <h4>PM2</h4>
            <p id="status-pm2">Checking...</p>
          </div>
        </div>
        <div class="status-item">
          <div class="status-icon online" id="light-crons"></div>
          <div class="status-info">
            <h4>Crons</h4>
            <p id="status-crons">Checking...</p>
          </div>
        </div>
        <div class="status-item">
          <div class="status-icon online" id="light-research"></div>
          <div class="status-info">
            <h4>Research</h4>
            <p id="status-research">Checking...</p>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Quick Controls</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button onclick="restartGateway()" class="control-btn">Restart Gateway</button>
          <button onclick="runHealthCheck()" class="control-btn">Health Check</button>
          <button onclick="refreshData()" class="control-btn">Refresh</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">System Health Details</span>
        </div>
        <div id="health-details">Loading...</div>
      </div>
    </div>

    <div class="tab-content" id="tab-schedule">
      <div class="schedule-grid" id="schedule-grid"></div>
      <div class="card" style="margin-top: 16px;">
        <div class="card-header">
          <span class="card-title">📌 Next Up</span>
        </div>
        <div id="next-up-list" class="next-up-list">
          <p class="loading">Loading...</p>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-tasks">
      <div class="tasks-list" id="tasks-list"></div>
    </div>

    <div class="tab-content" id="tab-ebay">
      <div class="embed-container">
        <iframe src="http://localhost:3000/ebay" id="ebay-frame"></iframe>
      </div>
    </div>

    <div class="tab-content" id="tab-levelup">
      <div class="embed-container">
        <iframe src="http://localhost:5000" id="levelup-frame"></iframe>
      </div>
    </div>

    <div class="tab-content" id="tab-podcast">
      <div class="embed-container">
        <iframe src="http://localhost:5001" id="podcast-frame"></iframe>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';
    let tasks = [];

    // Clock
    function updateClock() {
      const now = new Date();
      const options = { 
        timeZone: 'America/New_York',
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit',
        hour12: false 
      };
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // Load tasks
    async function loadTasks() {
      try {
        // Use cron-jobs endpoint for full details
        const res = await fetch(API_BASE + '/cron-jobs');
        tasks = await res.json();
        tasks = tasks.filter(t => t.enabled);
        renderTasks();
        renderSchedule();
        renderNextUp();
        updateStatusFromTasks();
      } catch (e) {
        console.error('Failed to load tasks:', e);
      }
    }

    // Update status lights based on tasks
    function updateStatusFromTasks() {
      const running = tasks.filter(t => t.status === 'running' || t.status === 'ok').length;
      const error = tasks.filter(t => t.status === 'error').length;
      
      document.getElementById('status-crons').textContent = `${running} tasks, ${error} errors`;
      document.getElementById('light-crons').className = 'status-icon ' + (error > 0 ? 'offline' : 'online');
      
      // Check research tasks
      const researchTasks = tasks.filter(t => t.name.toLowerCase().includes('research') || t.name.toLowerCase().includes('finance'));
      const researchRunning = researchTasks.filter(t => t.status === 'ok' || t.status === 'running').length;
      document.getElementById('status-research').textContent = researchRunning > 0 ? 'Active' : 'Scheduled';
      document.getElementById('light-research').className = 'status-icon online';
    }

    // Convert cron to readable time
    function cronToReadable(cron) {
      if (!cron) return 'Manual';
      
      // Handle */5 * * * * format
      const everyMatch = cron.match(/^\*\/(\d+)\s+\*\s+\*\s+\*\s+\*$/);
      if (everyMatch) {
        return `Every ${everyMatch[1]} min`;
      }
      
      // Handle specific time: 0 6 * * 1-5 (cron 0 6 * * 1-5)
      const match = cron.match(/cron\s+(\d+)\s+(\d+)/);
      if (match) {
        const hour = parseInt(match[2]);
        const mins = match[1].padStart(2, '0');
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const hour12 = hour % 12 || 12;
        return `${hour12}:${mins} ${ampm}`;
      }
      
      // Handle specific time without "cron" prefix: 0 6 * * 1-5
      const directMatch = cron.match(/^(\d+)\s+(\d+)\s+\*\s+\*\s+([\d,\-]+)$/);
      if (directMatch) {
        const hour = parseInt(directMatch[2]);
        const mins = directMatch[1].padStart(2, '0');
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const hour12 = hour % 12 || 12;
        return `${hour12}:${mins} ${ampm}`;
      }
      
      // Daily
      if (cron.includes('daily')) return 'Daily';
      // Every X
      const everyXMatch = cron.match(/every\s+(\d+)\s*(\w+)/);
      if (everyXMatch) return `Every ${everyXMatch[1]} ${everyXMatch[2]}`;
      return cron;
    }

    // Render tasks
    function renderTasks() {
      const container = document.getElementById('tasks-list');
      container.innerHTML = tasks.map(task => `
        <div class="task-row">
          <div class="task-status ${task.status === 'error' ? 'error' : task.status === 'ok' ? '' : 'idle'}"></div>
          <span class="task-name">${task.name}</span>
          <span class="task-schedule">${cronToReadable(task.schedule)}</span>
          <span class="task-next">${task.next_run ? new Date(task.next_run).toLocaleString('en-US', {weekday:'short', hour:'numeric', minute:'2-digit', hour12:true}) : '-'}</span>
        </div>
      `).join('');
    }

    // Render schedule
    function renderSchedule() {
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const today = new Date().getDay();
      
      const daySchedules = {};
      days.forEach((day, i) => daySchedules[i] = []);

      tasks.forEach(task => {
        if (!task.schedule) return;
        const s = task.schedule.toLowerCase();
        
        // Handle */5 * * * * (every X minutes) - show on all days
        if (s.startsWith('*/')) {
          days.forEach((_, i) => daySchedules[i].push(task));
          return;
        }
        
        // Match cron with days - handle "cron 0 7 * * *" format
        const match = s.match(/cron\s+(\d+)\s+(\d+)\s+(\S+)\s+(\S+)\s+([\d,\-*]+)/);
        if (match) {
          const dayPart = match[5];
          // * means every day
          if (dayPart === '*') {
            days.forEach((_, i) => daySchedules[i].push(task));
          } else if (dayPart.includes('-')) {
            const [start, end] = dayPart.split('-').map(Number);
            for (let d = start; d <= end; d++) daySchedules[d]?.push(task);
          } else {
            const dayNums = dayPart.split(',').map(d => parseInt(d));
            dayNums.forEach(d => {
              if (daySchedules[d]) daySchedules[d].push(task);
            });
          }
        } else if (s.includes('daily')) {
          days.forEach((_, i) => daySchedules[i].push(task));
        }
      });

      const html = days.map((day, i) => {
        const dayTasks = daySchedules[i] || [];
        // Sort by time
        dayTasks.sort((a, b) => {
          const aMatch = (a.schedule || '').match(/cron\s+(\d+)\s+(\d+)/);
          const bMatch = (b.schedule || '').match(/cron\s+(\d+)\s+(\d+)/);
          const aTime = aMatch ? parseInt(aMatch[2])*60 + parseInt(aMatch[1]) : 0;
          const bTime = bMatch ? parseInt(bMatch[2])*60 + parseInt(bMatch[1]) : 0;
          return aTime - bTime;
        });
        
        return `
        <div class="schedule-day ${i === today ? 'today' : ''}">
          <div class="day-name">${day}</div>
          ${dayTasks.map(t => {
            // Use cronToReadable for time
            const readableTime = cronToReadable(t.schedule || '');
            // Color coding by system
            let pillClass = 'web';
            const name = t.name.toLowerCase();
            if (name.includes('bitcoin') || name.includes('sports') || name.includes('21m') || name.includes('tweet')) {
              pillClass = 'tm-21m';  // Blue for 21M
            } else if (name.includes('podcast')) {
              pillClass = 'tm-podcast';  // Purple for Podcast
            } else if (name.includes('finance') || name.includes('trending')) {
              pillClass = 'tm-finance';  // Green for Finance
            } else if (name.includes('ebay') || name.includes('scan')) {
              pillClass = 'tm-ebay';  // Orange for eBay
            } else if (name.includes('lead') || name.includes('generator')) {
              pillClass = 'tm-lead';  // Yellow for Lead Gen
            } else if (name.includes('family')) {
              pillClass = 'tm-family';  // Pink for Family
            } else if (name.includes('reminder') || name.includes('gateway') || name.includes('pm2') || name.includes('ping')) {
              pillClass = 'tm-system';  // Gray for system
            }
            return `<div class="task-pill ${pillClass}">
              ${readableTime} ${t.name}
            </div>`;
          }).join('')}
        </div>`;
      }).join('');

      document.getElementById('schedule-grid').innerHTML = html;
    }

    // Render Next Up section
    function renderNextUp() {
      const container = document.getElementById('next-up-list');
      
      // Sort by next_run and take next 5
      const upcoming = [...tasks]
        .filter(t => t.next_run)
        .sort((a, b) => new Date(a.next_run) - new Date(b.next_run))
        .slice(0, 5);
      
      if (upcoming.length === 0) {
        container.innerHTML = '<p class="empty">No upcoming tasks</p>';
        return;
      }
      
      container.innerHTML = upcoming.map(t => {
        const nextDate = new Date(t.next_run);
        const timeStr = nextDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        const dateStr = nextDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        
        return `
          <div class="next-up-item">
            <div class="next-up-time">${dateStr} ${timeStr}</div>
            <div class="next-up-name">${t.name}</div>
            <div class="next-up-status ${t.status}">${t.status}</div>
          </div>
        `;
      }).join('');
    }

    // Load health
    async function loadHealth() {
      try {
        const res = await fetch(API_BASE + '/health');
        const health = await res.json();
        
        // Update individual lights
        const checks = health.checks || [];
        const getStatus = (name) => checks.find(c => c.name.toLowerCase().includes(name.toLowerCase()))?.status || 'healthy';
        
        // Gateway
        const gwStatus = getStatus('gateway');
        document.getElementById('light-gateway').className = 'status-icon ' + (gwStatus === 'healthy' ? 'online' : gwStatus === 'warning' ? 'warning' : 'offline');
        document.getElementById('status-gateway').textContent = gwStatus === 'healthy' ? 'Online' : gwStatus;
        
        // Telegram
        const tgStatus = getStatus('telegram');
        document.getElementById('light-telegram').className = 'status-icon ' + (tgStatus === 'healthy' ? 'online' : 'offline');
        document.getElementById('status-telegram').textContent = tgStatus === 'healthy' ? 'Connected' : tgStatus;
        
        // Email
        const emailStatus = getStatus('email');
        document.getElementById('light-email').className = 'status-icon ' + (emailStatus === 'healthy' ? 'online' : 'offline');
        document.getElementById('status-email').textContent = emailStatus === 'healthy' ? 'Ready' : emailStatus;
        
        // PM2
        const pm2Status = getStatus('pm2');
        document.getElementById('light-pm2').className = 'status-icon ' + (pm2Status === 'healthy' ? 'online' : 'offline');
        document.getElementById('status-pm2').textContent = pm2Status === 'healthy' ? 'Running' : pm2Status;

        // Health details
        document.getElementById('health-details').innerHTML = `
          <table style="width:100%;font-size:13px">
            <tr style="border-bottom:1px solid var(--border-subtle);text-align:left">
              <th style="padding:8px;color:var(--text-secondary)">Component</th>
              <th style="padding:8px;color:var(--text-secondary)">Status</th>
              <th style="padding:8px;color:var(--text-secondary)">Details</th>
            </tr>
            ${checks.map(c => `
              <tr style="border-bottom:1px solid var(--border-subtle)">
                <td style="padding:8px;font-weight:500">${c.name}</td>
                <td style="padding:8px;color:${c.status === 'healthy' ? 'var(--success)' : 'var(--danger)'}">${c.status}</td>
                <td style="padding:8px;color:var(--text-muted)">${c.message || '-'}</td>
              </tr>
            `).join('')}
          </table>
          <p style="color:var(--text-muted);font-size:12px;margin-top:12px">Last checked: ${new Date().toLocaleTimeString()}</p>
        `;
      } catch (e) {
        document.getElementById('health-details').innerHTML = `
          <div style="color: var(--danger);">Error loading health: ${e.message}</div>
        `;
      }
    }

    // Control functions
    async function restartGateway() {
      if (!confirm('Restart Gateway?')) return;
      try {
        const res = await fetch(API_BASE + '/control/restart-gateway', { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          alert('Gateway restarting...');
          setTimeout(loadHealth, 5000);
        } else {
          alert('Failed: ' + JSON.stringify(data));
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    async function runHealthCheck() {
      const btn = event.target;
      btn.textContent = 'Running...';
      await loadHealth();
      btn.textContent = '🩺 Run Health Check';
      alert('Health check complete!');
    }

    function refreshData() {
      loadTasks();
      loadHealth();
      alert('Data refreshed!');
    }

    // Load everything
    loadTasks();
    loadHealth();
    setInterval(loadHealth, 30000);
  </script>
</body>
</html>
