<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #111118;
      --bg-tertiary: #1a1a24;
      --bg-card: #16161f;
      --bg-card-hover: #1e1e2a;
      --border-color: #2a2a3a;
      --border-subtle: #1f1f2e;
      --text-primary: #ffffff;
      --text-secondary: #9898a8;
      --text-muted: #5a5a6e;
      --accent-primary: #6366f1;
      --accent-secondary: #818cf8;
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      --accent-glow: rgba(99, 102, 241, 0.25);
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.12);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.12);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.12);
      --info: #3b82f6;
      --info-bg: rgba(59, 130, 246, 0.12);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 15% 15%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 85%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 44px;
      height: 44px;
      background: var(--accent-gradient);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text-secondary);
      padding: 8px 16px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: var(--bg-card);
      padding: 6px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
    }

    .tab {
      padding: 12px 24px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab:hover {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    .tab.active {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    .tab-icon { font-size: 16px; }

    /* Tab Content */
    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Status Grid */
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .status-item {
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border-subtle);
      transition: all 0.2s ease;
    }

    .status-item:hover {
      border-color: var(--accent-primary);
      transform: translateY(-2px);
    }

    .status-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .status-icon.online { background: var(--success-bg); }
    .status-icon.offline { background: var(--danger-bg); }
    .status-icon.warning { background: var(--warning-bg); }

    .status-info h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .status-info p {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Schedule Grid */
    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .schedule-day {
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      padding: 12px;
      min-height: 120px;
      border: 1px solid var(--border-subtle);
    }

    .schedule-day.today {
      border-color: var(--accent-primary);
      background: rgba(99, 102, 241, 0.08);
    }

    .day-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .schedule-day.today .day-name {
      color: var(--accent-secondary);
    }

    .task-pill {
      font-size: 11px;
      padding: 4px 8px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid var(--border-subtle);
    }

    .task-pill.email { border-left: 2px solid #3b82f6; }
    .task-pill.telegram { border-left: 2px solid #10b981; }
    .task-pill.web { border-left: 2px solid #f59e0b; }

    /* Tasks List */
    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      transition: all 0.2s ease;
    }

    .task-row:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-primary);
    }

    .task-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }

    .task-status.idle { background: var(--text-muted); }
    .task-status.error { background: var(--danger); }

    .task-name {
      flex: 1;
      font-weight: 500;
      font-size: 14px;
    }

    .task-schedule {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-card);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
    }

    .task-next {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 100px;
      text-align: right;
    }

    /* Embeds */
    .embed-container {
      width: 100%;
      height: calc(100vh - 280px);
      min-height: 500px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border-subtle);
      background: var(--bg-tertiary);
    }

    .embed-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .embed-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
    }

    .embed-placeholder .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .tabs { overflow-x: auto; }
      .schedule-grid { grid-template-columns: 1fr; }
      .status-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">🎯</div>
        <h1>Mission Control</h1>
      </div>
      <div class="header-right">
        <div class="clock" id="clock">--:--:--</div>
      </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="system">
        <span class="tab-icon">🚀</span> System
      </button>
      <button class="tab" data-tab="schedule">
        <span class="tab-icon">📅</span> Schedule
      </button>
      <button class="tab" data-tab="tasks">
        <span class="tab-icon">📋</span> Tasks
      </button>
      <button class="tab" data-tab="ebay">
        <span class="tab-icon">📦</span> eBay
      </button>
      <button class="tab" data-tab="levelup">
        <span class="tab-icon">🎴</span> Level Up
      </button>
    </div>

    <!-- Tab Contents -->
    <div class="tab-content active" id="tab-system">
      <div class="status-grid" id="status-grid">
        <div class="status-item">
          <div class="status-icon online">✓</div>
          <div class="status-info">
            <h4>Gateway</h4>
            <p>Checking...</p>
          </div>
        </div>
        <div class="status-item">
          <div class="status-icon online">✓</div>
          <div class="status-info">
            <h4>Telegram</h4>
            <p>Checking...</p>
          </div>
        </div>
        <div class="status-item">
          <div class="status-icon online">✓</div>
          <div class="status-info">
            <h4>Email</h4>
            <p>Checking...</p>
          </div>
        </div>
        <div class="status-item">
          <div class="status-icon online">✓</div>
          <div class="status-info">
            <h4>PM2</h4>
            <p>Checking...</p>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">📊 System Health</span>
        </div>
        <div id="health-details">Loading...</div>
      </div>
    </div>

    <div class="tab-content" id="tab-schedule">
      <div class="schedule-grid" id="schedule-grid"></div>
    </div>

    <div class="tab-content" id="tab-tasks">
      <div class="tasks-list" id="tasks-list"></div>
    </div>

    <div class="tab-content" id="tab-ebay">
      <div class="embed-container">
        <iframe src="http://localhost:5000" id="ebay-frame"></iframe>
      </div>
    </div>

    <div class="tab-content" id="tab-levelup">
      <div class="embed-container">
        <iframe src="http://localhost:5001" id="levelup-frame"></iframe>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';
    let tasks = [];

    // Clock
    function updateClock() {
      const now = new Date();
      const options = { 
        timeZone: 'America/New_York',
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit',
        hour12: false 
      };
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // Load tasks
    async function loadTasks() {
      try {
        const res = await fetch(API_BASE + '/tasks');
        tasks = await res.json();
        renderTasks();
        renderSchedule();
      } catch (e) {
        console.error('Failed to load tasks:', e);
      }
    }

    // Render tasks
    function renderTasks() {
      const container = document.getElementById('tasks-list');
      container.innerHTML = tasks.map(task => `
        <div class="task-row">
          <div class="task-status ${task.status === 'idle' ? 'idle' : ''}"></div>
          <span class="task-name">${task.name}</span>
          <span class="task-schedule">${task.schedule || 'Manual'}</span>
          <span class="task-next">${task.next || '-'}</span>
        </div>
      `).join('');
    }

    // Render schedule
    function renderSchedule() {
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const today = new Date().getDay();
      
      const daySchedules = {};
      days.forEach((day, i) => daySchedules[i] = []);

      tasks.forEach(task => {
        if (!task.schedule) return;
        const s = task.schedule.toLowerCase();
        
        // Parse cron
        const match = s.match(/cron\s+\d+\s+\d+\s+\d+\s+\d+\s+([\d,]+)/);
        if (match) {
          const dayNums = match[1].split(',').map(d => parseInt(d));
          dayNums.forEach(d => {
            if (daySchedules[d]) daySchedules[d].push(task);
          });
        }
      });

      const html = days.map((day, i) => `
        <div class="schedule-day ${i === today ? 'today' : ''}">
          <div class="day-name">${day}</div>
          ${(daySchedules[i] || []).map(t => `
            <div class="task-pill ${t.name.includes('email') ? 'email' : t.name.includes('Telegram') ? 'telegram' : 'web'}">
              ${t.schedule?.match(/(\d+:\d+)/)?.[1] || ''} ${t.name}
            </div>
          `).join('')}
        </div>
      `).join('');

      document.getElementById('schedule-grid').innerHTML = html;
    }

    // Load health
    async function loadHealth() {
      try {
        const res = await fetch(API_BASE + '/health');
        const health = await res.json();
        
        const statusItems = document.querySelectorAll('.status-item');
        const statusMap = {
          'Gateway': health.checks?.find(c => c.name === 'Gateway')?.status || 'healthy',
          'Telegram': health.checks?.find(c => c.name === 'Telegram')?.status || 'healthy',
          'Email': health.checks?.find(c => c.name === 'Email')?.status || 'healthy',
          'PM2': health.checks?.find(c => c.name === 'PM2')?.status || 'healthy'
        };

        statusItems.forEach((item, i) => {
          const name = item.querySelector('h4').textContent;
          const status = statusMap[name] || 'healthy';
          const icon = item.querySelector('.status-icon');
          
          icon.className = 'status-icon ' + (status === 'healthy' ? 'online' : status === 'warning' ? 'warning' : 'offline');
          icon.textContent = status === 'healthy' ? '✓' : status === 'warning' ? '!' : '✗';
          item.querySelector('p').textContent = status === 'healthy' ? 'Online' : status === 'warning' ? 'Warning' : 'Offline';
        });

        document.getElementById('health-details').innerHTML = `
          <div style="color: var(--text-secondary); font-size: 14px;">
            All systems operational. Last checked: ${new Date().toLocaleTimeString()}
          </div>
        `;
      } catch (e) {
        document.getElementById('health-details').innerHTML = `
          <div style="color: var(--danger);">Error loading health: ${e.message}</div>
        `;
      }
    }

    // Load everything
    loadTasks();
    loadHealth();
    setInterval(loadHealth, 30000);
  </script>
</body>
</html>
