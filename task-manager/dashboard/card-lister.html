<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Card Lister</title>
  <style>
    :root {
      --bg-base: #0f1115;
      --bg-surface: #181b21;
      --bg-elevated: #22262f;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #10b981;
      --green-hover: #059669;
      --red: #ef4444;
      --amber: #f59e0b;
      --border: #334155;
      --radius: 8px;
      --radius-sm: 6px;
    }
    * { box-sizing: border-box; }
    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      min-height: 100vh;
      height: auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    h2 { margin: 0 0 12px 0; font-size: 1.2rem; font-weight: 600; }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 16px;
      text-align: center;
      background: var(--bg-surface);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 16px;
      touch-action: manipulation;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: rgba(59,130,246,0.05);
    }
    .camera-icon { width: 40px; height: 40px; margin-bottom: 8px; color: var(--text-secondary); }
    #file-input { display: none; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .gallery-cell {
      border-radius: var(--radius-sm);
      overflow: hidden;
      aspect-ratio: 1;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      position: relative;
    }
    .gallery-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-badge {
      position: absolute;
      top: 4px; left: 4px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      z-index: 2;
    }
    .gallery-actions { display: flex; gap: 8px; margin-bottom: 12px; }
    .gallery-actions button { flex: 1; }

    /* Account badge */
    #account-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      background: rgba(59,130,246,0.12);
      color: var(--accent);
      border: 1px solid rgba(59,130,246,0.25);
      white-space: nowrap;
    }
    #account-badge.disconnected {
      background: rgba(239,68,68,0.1);
      color: var(--red);
      border-color: rgba(239,68,68,0.2);
    }
    #account-badge a { color: inherit; text-decoration: none; }
    #account-badge a:hover { text-decoration: underline; }

    /* Form */
    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      margin-bottom: 4px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.01em;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea { resize: none; }
    .row { display: flex; gap: 10px; }
    .col { flex: 1; min-width: 0; }
    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      transition: all 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .chip.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .chip-auto { border-color: var(--amber); color: var(--amber); }
    .chip-auto.active { background: var(--amber); color: #000; border-color: var(--amber); }

    /* Card type toggle */
    .type-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
    }
    .type-btn {
      flex: 1;
      padding: 10px;
      text-align: center;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .type-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
    .type-btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
    .type-btn.active { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--accent); }
    .type-btn.active[data-type="raw"] { border-color: var(--accent); }
    .type-btn.active[data-type="graded"] { border-color: var(--green); }
    .type-btn.active[data-type="auto"] { border-color: var(--amber); }

    /* Auto section */
    .auto-section { display: none; }
    .auto-section.visible { display: block; }

    /* Submit */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
      margin-top: 8px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-green { background: var(--green); color: white; }
    .btn-green:hover { background: var(--green-hover); }

    .status-msg {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      font-size: 0.85rem;
      display: none;
    }
    .status-msg.error { display: block; background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .status-msg.success { display: block; background: rgba(16,185,129,0.1); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
    .status-msg.info { display: block; background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid rgba(59,130,246,0.2); }

    .inline-toggle {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-top: 6px;
    }
    .inline-toggle label { margin: 0; display: inline; }
    .inline-toggle input[type="checkbox"] {
      width: auto;
      accent-color: var(--accent);
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <h2>Card Lister</h2>
    <div id="account-badge" class="disconnected">
      <span>⏳</span><span>Checking...</span>
    </div>
  </div>

  <div id="status-msg" class="status-msg"></div>

  <!-- Upload -->
  <div class="upload-area" id="upload-area" role="button" tabindex="0">
    <svg class="camera-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <div style="color:var(--text-secondary);font-size:0.9rem;">Tap to add photos (max 3)</div>
    <div style="color:var(--text-secondary);font-size:0.75rem;margin-top:4px;">Improves listing quality</div>
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" multiple>
  </div>

  <!-- Gallery -->
  <div id="gallery" class="gallery-grid" style="display:none;"></div>
  <div class="gallery-actions" id="gallery-actions" style="display:none;">
    <button class="chip" onclick="clearGallery()" style="border-color:var(--red);color:var(--red);">Clear Photos</button>
  </div>

  <!-- Card Type Toggle -->
  <div class="type-toggle">
    <div class="type-btn active" data-type="raw" onclick="setType('raw')">Raw</div>
    <div class="type-btn" data-type="graded" onclick="setType('graded')">Graded</div>
    <div class="type-btn" data-type="auto" onclick="setType('auto')">Auto</div>
  </div>

  <!-- Form -->
  <form id="card-form" onsubmit="return submitListing(event)">
    <div class="row">
      <div class="col form-group">
        <label for="title">Card Title *</label>
        <input type="text" id="title" placeholder="e.g. 2023 Topps Chrome Shohei Ohtani" required>
      </div>
    </div>
    <div class="row">
      <div class="col form-group">
        <label for="player">Player</label>
        <input type="text" id="player" placeholder="Player name">
      </div>
      <div class="col form-group">
        <label for="year">Year</label>
        <input type="number" id="year" placeholder="2023" min="1900" max="2099">
      </div>
    </div>
    <div class="row">
      <div class="col form-group">
        <label for="brand">Brand</label>
        <input type="text" id="brand" placeholder="Topps, Panini, etc.">
      </div>
      <div class="col form-group">
        <label for="set_name">Set Name</label>
        <input type="text" id="set_name" placeholder="Chrome, Prizm, etc.">
      </div>
    </div>
    <div class="row">
      <div class="col form-group">
        <label for="card_number">Card #</label>
        <input type="text" id="card_number" placeholder="e.g. #1">
      </div>
      <div class="col form-group">
        <label for="sport">Sport</label>
        <select id="sport">
          <option value="">Select</option>
          <option value="baseball">Baseball</option>
          <option value="basketball">Basketball</option>
          <option value="football">Football</option>
          <option value="hockey">Hockey</option>
          <option value="soccer">Soccer</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>

    <!-- Graded section -->
    <div class="auto-section" id="graded-section">
      <div class="row">
        <div class="col form-group">
          <label for="grader">Grader</label>
          <select id="grader">
            <option value="">Select</option>
            <option value="PSA">PSA</option>
            <option value="BGS">BGS</option>
            <option value="SGC">SGC</option>
            <option value="CSG">CSG</option>
            <option value="CGC">CGC</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="col form-group">
          <label for="grade">Grade</label>
          <select id="grade">
            <option value="">Select</option>
            <option value="10">10 (Gem Mint)</option>
            <option value="9.5">9.5 (Gem Mint)</option>
            <option value="9">9 (Mint)</option>
            <option value="8.5">8.5</option>
            <option value="8">8</option>
            <option value="7">7</option>
            <option value="6">6</option>
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="cert_number">Cert #</label>
        <input type="text" id="cert_number" placeholder="Grading certification number">
      </div>
    </div>

    <!-- Auto section -->
    <div class="auto-section" id="auto-section">
      <div class="row">
        <div class="col form-group">
          <label for="parallel">Parallel / Variation</label>
          <input type="text" id="parallel" placeholder="e.g. Refractor, Prism">
        </div>
      </div>
      <div class="inline-toggle">
        <input type="checkbox" id="is_serialized">
        <label for="is_serialized">Serial numbered</label>
      </div>
      <div class="form-group" id="serial-group" style="display:none;">
        <label for="serial_number">Serial #</label>
        <input type="text" id="serial_number" placeholder="e.g. 23/99">
      </div>
    </div>

    <!-- Price & Listing -->
    <div class="row">
      <div class="col form-group">
        <label for="price">Price ($) *</label>
        <input type="number" id="price" step="0.01" min="0.99" placeholder="0.00" required>
      </div>
      <div class="col form-group">
        <label for="format">Format</label>
        <select id="format">
          <option value="FIXED_PRICE">Fixed Price</option>
          <option value="AUCTION">Auction</option>
          <option value="BEST_OFFER">Best Offer</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label for="duration">Duration</label>
      <select id="duration">
        <option value="GTC">Good Till Cancelled</option>
        <option value="DAYS_1">1 Day</option>
        <option value="DAYS_3">3 Days</option>
        <option value="DAYS_5">5 Days</option>
        <option value="DAYS_7">7 Days</option>
        <option value="DAYS_10">10 Days</option>
      </select>
    </div>
    <div class="inline-toggle">
      <input type="checkbox" id="best_offer">
      <label for="best_offer">Accept Best Offer</label>
    </div>

    <button type="submit" class="btn btn-primary" id="submit-btn">
      <span id="submit-text">List on eBay</span>
      <span id="submit-spinner" class="spinner" style="display:none;"></span>
    </button>
  </form>

  <script>
    const DRAFT_KEY = 'cardminer_draft';
    let photos = [];
    let cardType = 'raw';
    let isSubmitting = false;
    let currentSession = null;

    // ── Session / Account Badge ────────────────────────────────────

    async function checkSession() {
      const badge = document.getElementById('account-badge');
      try {
        const res = await fetch('/api/card-lister/session');
        const data = await res.json();
        currentSession = data;
        if (data.logged_in && data.user) {
          badge.className = '';
          badge.innerHTML = `<span>✓</span><span>Listing as <strong>${escapeHtml(data.user.ebay_username)}</strong></span>`;
        } else {
          badge.className = 'disconnected';
          badge.innerHTML = `<span>✗</span><span><a href="https://cardminer.jettmissioncontrol.com/connect" target="_blank">Connect eBay</a> to list under your account</span>`;
        }
      } catch (e) {
        badge.className = 'disconnected';
        badge.innerHTML = `<span>✗</span><span>Connect eBay to list cards</span>`;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Upload / Gallery ──────────────────────────────────────────

    document.getElementById('upload-area').addEventListener('click', () => {
      document.getElementById('file-input').click();
    });

    document.getElementById('upload-area').addEventListener('dragover', (e) => {
      e.preventDefault();
      document.getElementById('upload-area').classList.add('dragover');
    });

    document.getElementById('upload-area').addEventListener('dragleave', () => {
      document.getElementById('upload-area').classList.remove('dragover');
    });

    document.getElementById('upload-area').addEventListener('drop', (e) => {
      e.preventDefault();
      document.getElementById('upload-area').classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    document.getElementById('file-input').addEventListener('change', (e) => {
      handleFiles(e.target.files);
      e.target.value = '';
    });

    function handleFiles(files) {
      const remaining = 3 - photos.length;
      if (remaining <= 0) {
        showStatus('Maximum 3 photos allowed', 'error');
        return;
      }
      for (const file of Array.from(files).slice(0, remaining)) {
        if (!file.type.startsWith('image/')) continue;
        if (file.size > 10 * 1024 * 1024) {
          showStatus(`${file.name} is too large (max 10MB)`, 'error');
          continue;
        }
        photos.push(file);
        renderGallery();
      }
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      const actions = document.getElementById('gallery-actions');
      if (photos.length === 0) {
        gallery.style.display = 'none';
        actions.style.display = 'none';
        return;
      }
      gallery.style.display = 'grid';
      actions.style.display = 'flex';
      gallery.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const cell = document.createElement('div');
        cell.className = 'gallery-cell';
        if (photos[i]) {
          const img = document.createElement('img');
          img.src = URL.createObjectURL(photos[i]);
          img.alt = `Photo ${i + 1}`;
          cell.appendChild(img);
          const badge = document.createElement('div');
          badge.className = 'photo-badge';
          badge.textContent = `📷 ${i + 1}`;
          cell.appendChild(badge);
        }
        gallery.appendChild(cell);
      }
    }

    function clearGallery() {
      photos = [];
      renderGallery();
    }

    // ── Card Type Toggle ──────────────────────────────────────────

    function setType(type) {
      cardType = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
      document.getElementById('graded-section').classList.toggle('visible', type === 'graded');
      document.getElementById('auto-section').classList.toggle('visible', type === 'auto');
    }

    document.getElementById('is_serialized').addEventListener('change', function() {
      document.getElementById('serial-group').style.display = this.checked ? 'block' : 'none';
    });

    // ── Submit Listing ────────────────────────────────────────────

    async function submitListing(e) {
      e.preventDefault();
      if (isSubmitting) return;

      const title = document.getElementById('title').value.trim();
      const price = parseFloat(document.getElementById('price').value);
      if (!title || !price || price < 0.99) {
        showStatus('Title and price (min $0.99) are required', 'error');
        return;
      }

      isSubmitting = true;
      document.getElementById('submit-text').textContent = 'Listing...';
      document.getElementById('submit-spinner').style.display = 'inline-block';
      document.getElementById('submit-btn').disabled = true;

      try {
        // Upload photos if any
        let imageUrls = [];
        if (photos.length > 0) {
          showStatus('Uploading photos...', 'info');
          for (const photo of photos) {
            const formData = new FormData();
            formData.append('image', photo);
            const uploadRes = await fetch('/api/card-lister/upload', { method: 'POST', body: formData });
            if (uploadRes.ok) {
              const uploadData = await uploadRes.json();
              if (uploadData.url) imageUrls.push(uploadData.url);
            }
          }
        }

        showStatus('Listing on eBay...', 'info');

        const body = {
          title,
          player: document.getElementById('player').value.trim() || null,
          year: parseInt(document.getElementById('year').value) || null,
          brand: document.getElementById('brand').value.trim() || null,
          set_name: document.getElementById('set_name').value.trim() || null,
          card_number: document.getElementById('card_number').value.trim() || null,
          sport: document.getElementById('sport').value || null,
          parallel: document.getElementById('parallel').value.trim() || null,
          is_auto: cardType === 'auto',
          is_serialized: document.getElementById('is_serialized').checked,
          serial_number: document.getElementById('serial_number').value.trim() || null,
          is_graded: cardType === 'graded',
          grader: document.getElementById('grader').value || null,
          grade: document.getElementById('grade').value || null,
          cert_number: document.getElementById('cert_number').value.trim() || null,
          price,
          format: document.getElementById('format').value,
          duration: document.getElementById('duration').value,
          best_offer: document.getElementById('best_offer').checked,
          imageUrls
        };

        const res = await fetch('/api/card-lister/list', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (data.success && data.url) {
          showStatus(`✅ Listed successfully! <a href="${data.url}" target="_blank" style="color:var(--green)">View on eBay →</a>`, 'success');
          document.getElementById('card-form').reset();
          clearGallery();
          setType('raw');
          // Save scan record
          try {
            await fetch('/api/card-lister/save-scan', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ...body, status: 'listed', listing_url: data.url, listing_id: data.listingId })
            });
          } catch (_) {}
        } else {
          showStatus(`Listing failed: ${data.error || 'Unknown error'}`, 'error');
        }
      } catch (e) {
        showStatus(`Error: ${e.message}`, 'error');
      } finally {
        isSubmitting = false;
        document.getElementById('submit-text').textContent = 'List on eBay';
        document.getElementById('submit-spinner').style.display = 'none';
        document.getElementById('submit-btn').disabled = false;
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status-msg');
      el.className = 'status-msg ' + type;
      el.innerHTML = msg;
    }

    // ── Draft Auto-Save ──────────────────────────────────────────

    function saveDraft() {
      const title = document.getElementById('title').value.trim();
      if (!title) return;
      const draft = {
        title,
        player: document.getElementById('player').value.trim(),
        year: document.getElementById('year').value,
        brand: document.getElementById('brand').value.trim(),
        set_name: document.getElementById('set_name').value.trim(),
        card_number: document.getElementById('card_number').value.trim(),
        sport: document.getElementById('sport').value,
        price: document.getElementById('price').value,
        format: document.getElementById('format').value,
        cardType
      };
      try {
        localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
      } catch (_) {}
    }

    function loadDraft() {
      try {
        const raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) return;
        const draft = JSON.parse(raw);
        if (!draft.title) return;
        document.getElementById('title').value = draft.title || '';
        document.getElementById('player').value = draft.player || '';
        document.getElementById('year').value = draft.year || '';
        document.getElementById('brand').value = draft.brand || '';
        document.getElementById('set_name').value = draft.set_name || '';
        document.getElementById('card_number').value = draft.card_number || '';
        document.getElementById('sport').value = draft.sport || '';
        document.getElementById('price').value = draft.price || '';
        document.getElementById('format').value = draft.format || 'FIXED_PRICE';
        if (draft.cardType) setType(draft.cardType);
      } catch (_) {}
    }

    // Auto-save on form changes
    document.addEventListener('input', saveDraft);

    // ── Init ───────────────────────────────────────────────────────

    loadDraft();
    checkSession();
  </script>
</body>
</html>
