<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jett AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-base: #09090b; --bg-surface: #111115; --bg-elevated: #1c1c22; --bg-hover: #222228;
    --border: rgba(255,255,255,0.07); --border-mid: rgba(255,255,255,0.12);
    --text-primary: #ededf0; --text-secondary: #8b8b9a; --text-muted: #44444f;
    --accent: #3b82f6; --accent-dim: rgba(59,130,246,0.15);
    --green: #22c55e; --red: #ef4444; --amber: #f59e0b; --purple: #a855f7;
    --radius: 6px;
  }
  html, body { height: 100%; background: var(--bg-base); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 13px; line-height: 1.5; }
  
  .chat-container { display: flex; flex-direction: column; height: calc(100vh - 48px); max-width: 900px; margin: 0 auto; }
  .chat-header { padding: 16px 0 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .chat-title { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); }
  .chat-model-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px; }
  
  .messages { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 12px; }
  .msg { display: flex; gap: 10px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; }
  .msg.user .msg-avatar { background: var(--accent-dim); color: var(--accent); }
  .msg.assistant .msg-avatar { background: var(--bg-elevated); color: var(--text-secondary); }
  .msg-content { 
    background: var(--bg-surface); border: 1px solid var(--border); 
    border-radius: 8px; padding: 10px 14px; 
    font-size: 13px; line-height: 1.6; color: var(--text-primary); 
    white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.user .msg-content { background: var(--accent-dim); border-color: rgba(59,130,246,0.2); }
  .msg-content p { margin-bottom: 6px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content code { background: var(--bg-elevated); padding: 1px 4px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .msg-content pre { background: var(--bg-base); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin: 8px 0; overflow-x: auto; }
  .msg-content pre code { background: none; padding: 0; }
  .msg-content ul, .msg-content ol { padding-left: 18px; margin: 6px 0; }
  
  .suggestion-chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 0 4px; }
  .suggestion-chip {
    padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 11px; color: var(--text-secondary); cursor: pointer;
    background: var(--bg-surface); transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .input-area { 
    border-top: 1px solid var(--border); padding: 12px 0 16px; 
    display: flex; gap: 8px; align-items: flex-end;
  }
  .input-wrap { flex: 1; position: relative; }
  .chat-input {
    width: 100%; background: var(--bg-elevated); border: 1px solid var(--border-mid);
    border-radius: 8px; padding: 10px 14px; padding-right: 40px;
    font-size: 13px; color: var(--text-primary); font-family: 'Inter', sans-serif;
    outline: none; resize: none; min-height: 40px; max-height: 160px;
    line-height: 1.5; transition: border-color 0.15s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 8px; border: none;
    background: var(--accent); color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  
  .thinking { color: var(--text-muted); font-size: 12px; font-family: 'DM Mono', monospace; padding: 8px 0; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  
  .error-msg { color: var(--red); font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 0; }
  
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 2px; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <span class="chat-title">Jett AI</span>
    <span class="chat-model-badge">DeepSeek</span>
  </div>
  <div class="messages" id="messages"></div>
  <div class="suggestion-chips" id="suggestionChips">
    <button class="suggestion-chip" onclick="sendSuggestion('https://')">Paste article URL</button>
    <button class="suggestion-chip" onclick="sendSuggestion('https://x.com/')">X/Twitter thread</button>
    <button class="suggestion-chip" onclick="sendSuggestion('What do you think about this: https://')">Ask about a link</button>
    <button class="suggestion-chip" onclick="sendSuggestion('Explain this like I\'m 5: https://')">ELI5</button>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea class="chat-input" id="chatInput" placeholder="Ask anything..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');

// Auto-resize textarea
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + 'px';
});

// Suggested prompts
const suggestions = [
  'Summarize this article: https://',
  'What happened in the markets today?',
  'Draft an email to a client about our services.',
  'Explain bitcoin in simple terms.',
  'Write a tweet about AI and automation.'
];

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'user' ? 'TH' : '🤖';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-content">${text.replace(/\n/g, '<br>').replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')}</div>
  `;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking';
  div.textContent = 'Thinking...';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

function addError(msg) {
  const div = document.createElement('div');
  div.className = 'error-msg';
  div.textContent = '⚠ ' + msg;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  
  chatInput.value = '';
  chatInput.style.height = 'auto';
  sendBtn.disabled = true;
  
  addMessage('user', text);
  addThinking();
  
  try {
    // Auto-detect URL for fetch-article
    let finalText = text;
    const urlMatch = text.match(/https?:\/\/[^\s]+/);
    if (urlMatch) {
      try {
        const articleRes = await fetch('/api/jett-ai/fetch-article', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ url: urlMatch[0] })
        });
        const articleData = await articleRes.json();
        if (articleData.content) {
          finalText = `Here is the article content to analyze:\n\n${articleData.content}\n\n${text}`;
        }
      } catch(e) {
        console.log('Article fetch not available, sending raw query');
      }
    }
    
    const res = await fetch('/api/jett-ai/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: finalText })
    });
    const data = await res.json();
    removeThinking();
    
    if (data.error) {
      addError(data.error);
    } else {
      addMessage('assistant', data.response || data.message || data.text || 'No response');
    }
  } catch(e) {
    removeThinking();
    addError(e.message);
  }
  
  sendBtn.disabled = false;
}

function sendSuggestion(text) {
  chatInput.value = text;
  // Focus and move cursor to end
  chatInput.focus();
  chatInput.setSelectionRange(text.length, text.length);
  // If it's a complete prompt (not a stub), send immediately
  if (!text.endsWith('://') && !text.endsWith('://')) {
    sendMessage();
  }
}

// Welcome message
addMessage('assistant', 'Hey Terry — I\'m Jett AI, powered by DeepSeek. Paste an article URL or X/Twitter link and I\'ll summarize it. I can also answer questions, explain concepts, or help with quick research. Drop a link to get started.');
</script>
</body>
</html>
