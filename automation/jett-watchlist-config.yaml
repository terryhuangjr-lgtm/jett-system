    type: stock
    sector: bitcoin_miner
    alerts:
      price_drop_pct: 5
      price_gain_pct: 7
      daily_drop_pct: 8
      daily_gain_pct: 10
      volume_spike_x: 2.5
    cooldown_minutes: 90

