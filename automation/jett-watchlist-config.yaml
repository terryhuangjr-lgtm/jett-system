# Jett Watchlist Config
# Edit this file to add/remove tickers or adjust thresholds
# price_drop_pct    - alert if drops this % in one polling cycle (15 min)
# price_gain_pct    - alert if gains this % in one polling cycle (15 min)
# daily_drop_pct    - alert if down this % vs yesterday's close
# daily_gain_pct    - alert if up this % vs yesterday's close
# volume_spike_x    - alert if volume is this multiple of 30-day avg
# cooldown_minutes  - minimum minutes between alerts for this ticker

settings:
  poll_interval_minutes: 15
  default_cooldown_minutes: 120
  news_lookback_hours: 2          # only surface news newer than this
  market_open: "09:30"
  market_close: "20:00"           # includes after-hours
  timezone: "America/New_York"

# Global news keywords - scanned across ALL tickers every cycle
global_keywords:
  - "Federal Reserve"
  - "Fed rate"
  - "interest rates"
  - "SEC investigation"
  - "SEC charges"
  - "Bitcoin ETF"
  - "crypto regulation"
  - "inflation"
  - "recession"
  - "earnings beat"
  - "earnings miss"
  - "bankruptcy"
  - "acquisition"
  - "merger"
  - "halted"

watchlist:
