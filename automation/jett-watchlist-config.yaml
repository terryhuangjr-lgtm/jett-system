settings:
  poll_interval_minutes: 15
  default_cooldown_minutes: 120
  news_lookback_hours: 2
  market_open: 09:30
  market_close: '20:00'
  timezone: America/New_York
global_keywords:
- Federal Reserve
- Fed rate
- interest rates
- SEC investigation
- SEC charges
- Bitcoin ETF
- crypto regulation
- inflation
- recession
- earnings beat
- earnings miss
- bankruptcy
- acquisition
- merger
- halted
