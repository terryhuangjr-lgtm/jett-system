<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CardIQ Scanner</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f5f5f5;">
    <tr>
      <td align="center" style="padding: 20px 10px;">
        
        <!-- Header -->
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 700px; background-color: #1e3a5f; border-radius: 12px 12px 0 0;">
          <tr>
            <td style="padding: 20px 24px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="font-size: 22px; font-weight: 700; color: #ffffff;">CardIQ Scanner</td>
                  <td align="right" style="color: #94a3b8; font-size: 13px;">{{SCAN_NAME}}</td>
                </tr>
                <tr>
                  <td colspan="2" style="padding-top: 8px; color: #cbd5e1; font-size: 14px;">Daily Report - {{DATE}} | {{TOTAL_RESULTS}} results</td>
                </tr>
              </table>
            </td>
          </tr>
        </table>

        <!-- Summary Bar -->
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 700px; background-color: #ffffff; border-bottom: 1px solid #e2e8f0;">
          <tr>
            <td style="padding: 14px 24px; color: #475569; font-size: 13px;">
              Search: {{SEARCH_TERM}} | {{TOTAL_RESULTS}} scored | {{HIGH_SCORES}} 8.0+ | {{STEALS}} steals
            </td>
          </tr>
        </table>

        <!-- Results Table -->
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 700px; background-color: #ffffff; border-radius: 0 0 12px 12px; overflow: hidden; border: 1px solid #e2e8f0;">
          
          <!-- Table Header -->
          <tr style="background-color: #1e3a5f;">
            <th style="padding: 12px 16px; text-align: left; color: #ffffff; font-size: 11px; font-weight: 600; text-transform: uppercase;">#</th>
            <th style="padding: 12px 16px; text-align: left; color: #ffffff; font-size: 11px; font-weight: 600; text-transform: uppercase;">Card</th>
            <th style="padding: 12px 16px; text-align: right; color: #ffffff; font-size: 11px; font-weight: 600; text-transform: uppercase;">Price</th>
            <th style="padding: 12px 16px; text-align: center; color: #ffffff; font-size: 11px; font-weight: 600; text-transform: uppercase;">Score</th>
            <th style="padding: 12px 16px; text-align: center; color: #ffffff; font-size: 11px; font-weight: 600; text-transform: uppercase;">Seller</th>
            <th style="padding: 12px 16px; text-align: center; color: #ffffff; font-size: 11px; font-weight: 600; text-transform: uppercase;">Age</th>
            <th style="padding: 12px 16px; text-align: center; color: #ffffff; font-size: 11px; font-weight: 600; text-transform: uppercase;">PSA 9</th>
            <th style="padding: 12px 16px; text-align: center; color: #ffffff; font-size: 11px; font-weight: 600; text-transform: uppercase;">PSA 10</th>
            <th style="padding: 12px 16px; text-align: center; color: #ffffff; font-size: 11px; font-weight: 600;"></th>
          </tr>

          {{TABLE_ROWS}}

        </table>

        <!-- Footer -->
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 700px;">
          <tr>
            <td align="center" style="padding: 20px 10px;">
              <span style="color: #64748b; font-size: 12px;">CardIQ - Your Card Intelligence Tool</span>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

</body>
</html>
