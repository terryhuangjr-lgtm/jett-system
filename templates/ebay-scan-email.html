<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CardMiner</title>
  <style>
    @media (max-width: 600px) {
      .hide-mobile { display: none !important; }
      .mobile-cell { padding: 8px 6px !important; font-size: 12px !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  
  <!--[if mso]>
  <table border="0" cellspacing="0" cellpadding="0"><tr><td>
  <![endif]-->
  
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #ffffff;">
    <tr>
      <td align="center" style="padding: 20px 10px;">
        
        <!-- Header -->
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 900px; background-color: #000000;">
          <tr>
            <td style="padding: 16px 24px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="font-size: 18px; font-weight: 500; color: #ffffff;">CardMiner</td>
                  <td style="font-size: 12px; color: #64748b; text-align: right;">{{SCAN_NAME}}</td>
                </tr>
                <tr>
                  <td colspan="2" style="padding-top: 8px; font-size: 12px; color: #94a3b8;">
                    {{DATE}} - {{TOTAL_RESULTS}} results - <span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;{{CARD_MODE_STYLE}}">{{CARD_MODE}}</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>

        <!-- Summary Bar -->
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 900px; background-color: #ffffff; border-bottom: 1px solid #e0e0e0;">
          <tr>
            <td style="padding: 10px 24px; font-size: 12px; color: #64748b;">
              Search: {{SEARCH_TERM}} - {{TOTAL_RESULTS}} scored - {{HIGH_SCORES}} above 8.0 - {{STEALS}} potential steals
            </td>
          </tr>
        </table>

        <!-- Results Table -->
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 900px; background-color: #ffffff; border: 1px solid #e0e0e0; border-bottom: none;">
          
          <!-- Table Header -->
          <tr style="background-color: #000000;">
            <th style="padding: 10px 12px; width: 30px; text-align: center; color: #94a3b8; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">#</th>
            <th style="padding: 10px 12px; width: 320px; text-align: left; color: #94a3b8; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Card</th>
            <th style="padding: 10px 12px; width: 80px; text-align: right; color: #94a3b8; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Price</th>
            <th style="padding: 10px 12px; width: 60px; text-align: center; color: #94a3b8; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Score</th>
            <th class="hide-mobile" style="padding: 10px 12px; width: 80px; text-align: center; color: #94a3b8; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Trust</th>
            <th class="hide-mobile" style="padding: 10px 12px; width: 45px; text-align: center; color: #94a3b8; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Age</th>
            <th class="hide-mobile" style="padding: 10px 12px; width: 65px; text-align: center; color: #94a3b8; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">PSA 9</th>
            <th class="hide-mobile" style="padding: 10px 12px; width: 65px; text-align: center; color: #94a3b8; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">PSA 10</th>
            <th class="hide-mobile" style="padding: 10px 12px; width: 60px; text-align: center; color: #94a3b8; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Time</th>
            <th style="padding: 10px 12px; width: 40px; text-align: center; color: #94a3b8; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;"></th>
          </tr>

          {{TABLE_ROWS}}

        </table>

        <!-- Footer -->
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 900px; background-color: #ffffff; border-top: 1px solid #e0e0e0;">
          <tr>
            <td align="center" style="padding: 14px 24px;">
              <span style="font-size: 11px; color: #94a3b8;">
                <a href="#" style="color: #64748b; text-decoration: none;">CardMiner</a>
                -
                <a href="#" style="color: #64748b; text-decoration: none;">Unsubscribe</a>
                -
                <a href="#" style="color: #64748b; text-decoration: none;">Preferences</a>
              </span>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

  <!--[if mso]>
  </td></tr></table>
  <![endif]-->

</body>
</html>
